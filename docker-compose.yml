services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: ${DB_NAME:-bolao}
      POSTGRES_USER: ${DB_USER:-bolao}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-bolao}
    volumes:
      - pgdata:/var/lib/postgresql/data
    expose:
      - "5432"

  redis:
    image: redis:7-alpine
    expose:
      - "6379"

  backend:
    build: ./backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - db
      - redis
    command: ["python", "manage.py", "runserver", "0.0.0.0:8000"]

  celery-worker:
    build: ./backend
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    depends_on:
      - db
      - redis
    command: ["celery", "-A", "core", "worker", "--loglevel=info", "--concurrency=2"]

  celery-beat:
    build: ./backend
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    depends_on:
      - db
      - redis
    command: ["celery", "-A", "core", "beat", "--loglevel=info", "--scheduler=celery.beat:PersistentScheduler"]

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    command: sh -c "npm install && npm run dev -- --host"

volumes:
  pgdata:
